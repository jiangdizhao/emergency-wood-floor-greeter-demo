<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>木地板 AI 选购顾问</title>
    <style>
      .utility-entry-dock {
        position: fixed;
        z-index: 80;
        right: 18px;
        bottom: 16px;
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
        max-width: min(92vw, 520px);
      }

      .utility-entry {
        padding: 9px 14px;
        border: 1px solid rgba(112, 76, 55, 0.2);
        border-radius: 999px;
        background: rgba(255, 253, 249, 0.92);
        box-shadow: 0 8px 22px rgba(71, 47, 34, 0.12);
        color: #76503b;
        font-family: Inter, "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
        font-size: 13px;
        font-weight: 750;
        text-decoration: none;
        backdrop-filter: blur(10px);
      }

      .utility-entry.primary {
        border-color: rgba(139, 79, 48, 0.25);
        background: linear-gradient(135deg, rgba(161, 96, 61, 0.96), rgba(112, 58, 38, 0.96));
        color: white;
      }

      .utility-entry[hidden],
      .proactive-sales-dock[hidden],
      .proactive-sales-contact[hidden] {
        display: none;
      }

      .utility-entry:hover,
      .proactive-sales-contact:hover,
      .proactive-sales-toggle:hover {
        transform: translateY(-1px);
      }

      .proactive-sales-dock {
        position: fixed;
        z-index: 79;
        right: 18px;
        bottom: 72px;
        width: min(430px, calc(100vw - 36px));
        padding: 15px 16px 16px;
        border: 1px solid rgba(132, 84, 57, 0.2);
        border-radius: 19px;
        background: rgba(255, 252, 247, 0.97);
        box-shadow: 0 18px 48px rgba(66, 42, 29, 0.18);
        color: #4f382d;
        font-family: Inter, "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
        backdrop-filter: blur(14px);
        opacity: 0;
        transform: translateY(10px);
        transition: opacity 180ms ease, transform 180ms ease;
      }

      .proactive-sales-dock.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .proactive-sales-heading {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .proactive-sales-heading strong {
        flex: 1;
        color: #704632;
        font-size: 13px;
      }

      .proactive-sales-pulse {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #b86d43;
        box-shadow: 0 0 0 5px rgba(184, 109, 67, 0.13);
      }

      .proactive-sales-toggle {
        padding: 5px 9px;
        border: 1px solid rgba(124, 79, 53, 0.18);
        border-radius: 999px;
        background: #fffaf5;
        color: #83614e;
        cursor: pointer;
        font: inherit;
        font-size: 11px;
        font-weight: 750;
      }

      .proactive-sales-text {
        margin: 12px 0 0;
        color: #665044;
        font-size: 14px;
        line-height: 1.68;
      }

      .proactive-sales-contact {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        margin-top: 12px;
        padding: 8px 13px;
        border-radius: 11px;
        background: linear-gradient(135deg, #9c5d3c, #713a26);
        color: white;
        font-size: 12px;
        font-weight: 800;
        text-decoration: none;
      }

      @media (max-width: 640px) {
        .utility-entry-dock {
          right: 10px;
          bottom: 10px;
        }

        .proactive-sales-dock {
          right: 10px;
          bottom: 68px;
          width: calc(100vw - 20px);
        }
      }
    </style>
    <script src="/bilingual-ui.js"></script>
    <script src="/bilingual-network.js"></script>
    <script>
      (() => {
        const sessionStorageKey = 'woodfloor_active_session_id'
        const offerStorageKey = 'woodfloor_follow_up_offer_visible'
        const originalFetch = window.fetch.bind(window)

        function rememberSession(value) {
          if (typeof value !== 'string' || !value.startsWith('session-')) return
          sessionStorage.setItem(sessionStorageKey, value)
          const link = document.getElementById('follow-up-entry')
          if (link) link.href = `/follow-up.html?session_id=${encodeURIComponent(value)}`
        }

        function updateOffer(payload) {
          if (!payload || typeof payload !== 'object') return
          const profile = payload.customer_profile || null
          const hasOfferSignal =
            payload.should_offer_contact === true ||
            profile?.contact_prompt_eligible === true ||
            profile?.contact_opt_in === true
          const isFreshSession =
            typeof payload.session_id === 'string' &&
            profile &&
            profile.contact_prompt_eligible === false &&
            profile.contact_opt_in === false &&
            (!Array.isArray(profile.recommended_product_ids) || profile.recommended_product_ids.length === 0)

          if (hasOfferSignal) sessionStorage.setItem(offerStorageKey, '1')
          else if (isFreshSession) sessionStorage.removeItem(offerStorageKey)

          const link = document.getElementById('follow-up-entry')
          if (link) link.hidden = sessionStorage.getItem(offerStorageKey) !== '1'
        }

        window.fetch = async (input, init) => {
          try {
            if (init && typeof init.body === 'string') {
              const body = JSON.parse(init.body)
              rememberSession(body && body.session_id)
            }
          } catch {
            // Non-JSON request body.
          }

          const response = await originalFetch(input, init)
          try {
            const contentType = response.headers.get('content-type') || ''
            if (contentType.includes('application/json')) {
              const payload = await response.clone().json()
              rememberSession(payload && payload.session_id)
              rememberSession(payload && payload.customer_profile && payload.customer_profile.session_id)
              updateOffer(payload)
            }
          } catch {
            // Session/offer capture must never interfere with the real API response.
          }
          return response
        }

        window.addEventListener('DOMContentLoaded', () => {
          const saved = sessionStorage.getItem(sessionStorageKey)
          if (saved) rememberSession(saved)
          const link = document.getElementById('follow-up-entry')
          if (link) link.hidden = sessionStorage.getItem(offerStorageKey) !== '1'
        })
      })()
    </script>
    <script>
      (() => {
        // A paused state used to persist in localStorage while the only Resume button
        // lived inside a dock that stayed hidden until narration ran. That created a
        // permanent deadlock after refresh: disabled narration, hidden dock, no way to
        // resume. Proactive guidance now starts enabled on every page load; pausing is
        // limited to the current loaded page and can still be resumed from the dock.
        localStorage.removeItem('woodfloor_proactive_sales_enabled')
        window.__WOODFLOOR_PROACTIVE_BOOTSTRAP_VERSION__ = '2026-07-14.3'
      })()
    </script>
    <script src="/proactive-tts-auto-patch.js?v=20260719-1"></script>
    <script src="/proactive-sales.js?v=20260714-3"></script>
  </head>
  <body>
    <div id="root"></div>
    <nav class="utility-entry-dock" aria-label="数据和后续服务">
      <a
        id="follow-up-entry"
        class="utility-entry primary"
        href="/follow-up.html"
        aria-label="获取本次方案与后续联系"
        hidden
      >
        获取方案与后续联系
      </a>
      <a class="utility-entry" href="/delete-my-data.html" aria-label="查看并删除我的本地数据">
        隐私与数据
      </a>
    </nav>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
